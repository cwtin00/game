<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vampir Köylü</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="background"></div>

  <div class="container">

    <div class="logo-box">
      <h1>VAMPİR <span>KÖYLÜ</span></h1>
      <p>CETİNWEB 11/B</p>
    </div>

    <div class="card">

      <input type="text" id="playerName" placeholder="İsminizi girin">

      <div class="buttons">

        <button id="createRoomBtn" class="primary-btn">
          Oda Oluştur
        </button>

        <div class="join-box">
          <input type="text" id="roomCodeInput" placeholder="Oda Kodu">

          <button id="joinRoomBtn" class="secondary-btn">
            Odaya Katıl
          </button>
        </div>

      </div>

    </div>

    <div id="lobby" class="lobby hidden">

      <h2>
        ODA:
        <span id="roomCodeText"></span>
      </h2>

      <div class="players-box">

        <h3>Oyuncular</h3>

        <ul id="playerList"></ul>

      </div>

      <button id="startGameBtn" class="start-btn">
        Oyunu Başlat
      </button>

      <div class="chat-box">

        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input-area">

          <input
            type="text"
            id="chatInput"
            placeholder="Mesaj yaz..."
          >

          <button id="sendBtn">
            Gönder
          </button>

        </div>

      </div>

      <button id="leaveBtn" class="leave-btn">
        Odadan Çık
      </button>

    </div>

  </div>

  <!-- ROLE SCREEN -->

  <div id="roleScreen" class="role-screen hidden">

    <div class="role-card">

      <h1 id="roleTitle">
        ROL
      </h1>

      <p id="roleDescription"></p>

      <div id="vampireTeam"></div>

      <button id="continueBtn">
        Devam Et
      </button>

    </div>

  </div>

  <!-- COUNTDOWN -->

  <div id="countdownScreen" class="countdown-screen hidden">

    <h1 id="countdownText">
      3
    </h1>

  </div>

  <!-- NIGHT SCREEN -->

  <div id="nightScreen" class="night-screen hidden">

    <h1 id="nightTitle">
      GECE
    </h1>

    <p id="nightSubtitle">
      Bekleniyor...
    </p>

    <div id="nightTimer">
      10
    </div>

    <div id="nightPlayers" class="night-players"></div>

  </div>

  <!-- VOTE SCREEN -->

  <div id="voteScreen" class="vote-screen hidden">

    <h1>
      OYLAMA ZAMANI
    </h1>

    <p id="voteTimer">
      10
    </p>

    <div id="votePlayers"></div>

    <div id="voteResult"></div>

  </div>

  <!-- WIN SCREEN -->

  <div id="winScreen" class="win-screen hidden">

    <h1 id="winTitle">
      KAZANAN
    </h1>

    <button id="restartGameBtn">
      Yeni Oyun Başlat
    </button>

  </div>

  <!-- GAME SCREEN -->

  <div id="gameScreen" class="game-screen hidden">

    <div class="top-bar">

      <h2 id="phaseText">
        GÜNDÜZ
      </h2>

    </div>

    <div id="alivePlayers" class="alive-players"></div>

    <div class="game-chat">

      <div id="gameMessages" class="game-messages"></div>

      <div class="game-input-area">

        <input
          type="text"
          id="gameChatInput"
          placeholder="Oyun içi mesaj yaz..."
        >

        <button id="gameSendBtn">
          Gönder
        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  </script>

  <script src="app.js"></script>

</body>
</html>
